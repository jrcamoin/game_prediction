services:
  - type: web
    name: game-predictor-api
    env: python
    rootDir: backend
    plan: starter
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: GAME_PREDICTOR_DB
        value: /var/data/game_predictor.sqlite3
